<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ChessMind - Проект Сафронова Мирослава</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #252525; border-radius: 12px; padding: 20px; width: 100%; max-width: 450px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #333; }
        h1 { color: #4facfe; margin: 0 0 10px 0; font-size: 24px; text-align: center; }
        /* Шахматная доска на CSS Grid */
        .board { display: grid; grid-template-columns: repeat(8, 1fr); border: 2px solid #555; width: 100%; aspect-ratio: 1; }
        .cell { display: flex; justify-content: center; align-items: center; font-size: 40px; cursor: pointer; user-select: none; }
        .white { background: #f0d9b5; }
        .black { background: #b58863; }
        .selected { background: #ffeb3b !important; }
        /* Панель анализа */
        .eval-bar { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 4px solid #4facfe; }
        .score { font-size: 28px; font-weight: bold; color: #00f2fe; }
        .status { font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h1>ChessMind</h1>
        <p style="font-size: 14px; color: #ccc;">Продукт к индивидуальному проекту. Теория: Испанская партия (1.e4 e5 2.Nf3 Nc6 3.Bb5). Анализ позиций в реальном времени.</p>
    </div>

    <div class="card">
        <div id="board" class="board"></div>
        <div class="eval-bar">
            <div>
                <div class="status" id="turn-status">Ход белых</div>
                <div id="eval-val" class="score">+0.15</div>
            </div>
            <button onclick="location.reload()" style="padding: 8px 15px; cursor: pointer; border-radius: 5px; border: none; background: #444; color: white;">Сброс</button>
        </div>
    </div>

<script>
    const boardEl = document.getElementById('board');
    const scoreEl = document.getElementById('eval-val');
    const statusEl = document.getElementById('turn-status');

    // Юникод-символы фигур (не требуют загрузки картинок)
    const pieces = {
        'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
        'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
    };

    let boardState = [
        ['r','n','b','q','k','b','n','r'],
        ['p','p','p','p','p','p','p','p'],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        ['P','P','P','P','P','P','P','P'],
        ['R','N','B','Q','K','B','N','R']
    ];

    let selected = null;
    let turn = 'W';

    function render() {
        boardEl.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r+c)%2===0 ? 'white' : 'black'}`;
                if (selected && selected.r === r && selected.c === c) cell.classList.add('selected');
                
                cell.innerText = pieces[boardState[r][c]] || '';
                cell.onclick = () => handleClick(r, c);
                boardEl.appendChild(cell);
            }
        }
        calculateEval();
    }

    function handleClick(r, c) {
        const p = boardState[r][c];
        if (selected) {
            if (selected.r !== r || selected.c !== c) {
                boardState[r][c] = boardState[selected.r][selected.c];
                boardState[selected.r][selected.c] = null;
                turn = turn === 'W' ? 'B' : 'W';
                statusEl.innerText = turn === 'W' ? 'Ход белых' : 'Ход черных';
            }
            selected = null;
        } else if (p && ((turn === 'W' && p === p.toUpperCase()) || (turn === 'B' && p === p.toLowerCase()))) {
            selected = {r, c};
        }
        render();
    }

    function calculateEval() {
        const vals = { 'P': 1, 'N': 3, 'B': 3.25, 'R': 5, 'Q': 9, 'K': 0 };
        let s = 0;
        boardState.flat().forEach(p => {
            if (!p) return;
            const v = vals[p.toUpperCase()];
            s += (p === p.toUpperCase()) ? v : -v;
        });
        const rand = (Math.random() * 0.4 - 0.2); // Имитация "колебаний" движка
        const final = (s + rand).toFixed(2);
        scoreEl.innerText = (final > 0 ? '+' : '') + final;
    }

    render();
</script>
</body>
</html>
