<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ChessMind - Нейросетевой анализ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 600px; width: 100%; }
        .block { background: #2d2d2d; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #444; }
        #myBoard { width: 100%; max-width: 400px; margin: 0 auto; }
        .info { text-align: center; font-size: 1.2em; margin-top: 15px; color: #40a3ff; }
        h1 { color: #40a3ff; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>ChessMind</h1>
    <div class="block">
        <h3>Теоретический модуль</h3>
        <p>Изучите Испанскую партию: 1. e4 e5 2. Nf3 Nc6 3. Bb5. Движок Stockfish (NNUE) покажет оценку в реальном времени.</p>
    </div>
    <div class="block">
        <div id="myBoard"></div>
        <div class="info" id="eval">Анализ: загрузка движка...</div>
    </div>
</div>

<script>
    var board = null;
    var game = new Chess();
    var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

    stockfish.onmessage = function(event) {
        if (event.data.includes('info depth')) {
            var match = event.data.match(/score cp (-?\d+)/);
            if (match) {
                var score = (parseInt(match[1]) / 100).toFixed(2);
                document.getElementById('eval').innerText = "Оценка: " + score;
            }
        }
    };

    function onDrop (source, target) {
        var move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';
        
        stockfish.postMessage("position fen " + game.fen());
        stockfish.postMessage("go depth 12");
    }

    // Ждем полной загрузки страницы
    window.onload = function() {
        var config = {
            draggable: true,
            position: 'start',
            onDrop: onDrop,
            // Фикс для GitHub Pages: берем картинки напрямую с проверенного сервера
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        board = Chessboard('myBoard', config);
        document.getElementById('eval').innerText = "Движок готов. Сделайте ход!";
    };
</script>
</body>
</html>
