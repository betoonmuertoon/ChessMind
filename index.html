<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessMind - Нейросетевой анализ</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e1e; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; }
        h1, h2 { color: #40a3ff; }
        .theory-block { background: #2d2d2d; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        #board { width: 400px; margin: 0 auto; }
        .evaluation { text-align: center; margin-top: 15px; font-size: 1.2em; font-weight: bold; color: #00ff64; }
        .status { text-align: center; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h1>ChessMind</h1>
    
    <div class="theory-block">
        <h2>Теоретический модуль</h2>
        <p>Испанская партия — один из самых популярных дебютов. Начинается ходами: 1. e4 e5 2. Nf3 Nc6 3. Bb5. Сделайте эти ходы на доске ниже, чтобы увидеть оценку позиции от движка Stockfish.</p>
    </div>

    <div class="theory-block">
        <h2>Интерактивный анализ</h2>
        <div id="board"></div>
        <div class="status" id="status">Ожидание хода...</div>
        <div class="evaluation" id="evaluation">Оценка: 0.00</div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
    var board = null;
    var game = new Chess();
    var $status = $('#status');
    var $eval = $('#evaluation');
    
    // Инициализация Web Worker для Stockfish
    // Используем WASM версию движка
    var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

    stockfish.onmessage = function(event) {
        var line = event.data;
        // Парсинг UCI ответа движка
        if (line.includes("info depth")) {
            var match = line.match(/score cp (-?\d+)/);
            if (match) {
                var score = (parseInt(match[1]) / 100).toFixed(2);
                if (game.turn() === 'b') score = -score; // Инверсия для черных
                $eval.text("Оценка: " + (score > 0 ? "+" : "") + score);
            }
            var mateMatch = line.match(/score mate (-?\d+)/);
            if (mateMatch) {
                $eval.text("Мат через: " + Math.abs(mateMatch[1]) + " ходов");
            }
        }
    };

    stockfish.postMessage("uci");
    stockfish.postMessage("ucinewgame");

    function updateEval() {
        var fen = game.fen();
        stockfish.postMessage("position fen " + fen);
        stockfish.postMessage("go depth 15"); // Глубина анализа
    }

    function onDragStart (source, piece, position, orientation) {
        if (game.game_over()) return false;
        if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
            (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
            return false;
        }
    }

    function onDrop (source, target) {
        var move = game.move({
            from: source,
            to: target,
            promotion: 'q'
        });

        if (move === null) return 'snapback';

        updateStatus();
        updateEval();
    }

    function onSnapEnd () {
        board.position(game.fen());
    }

    function updateStatus () {
        var status = '';
        var moveColor = game.turn() === 'w' ? 'Белых' : 'Черных';

        if (game.in_checkmate()) {
            status = 'Игра окончена, ' + moveColor + ' получили мат.';
        } else if (game.in_draw()) {
            status = 'Игра окончена, ничья';
        } else {
            status = 'Ход ' + moveColor;
            if (game.in_check()) status += ', Шах';
        }
        $status.text(status);
    }

    var config = {
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
    };
    
    board = Chessboard('board', config);
    updateStatus();
    updateEval();
</script>

</body>
</html>
