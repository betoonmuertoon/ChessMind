<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ChessMind - Интеллектуальный Анализ</title>
    <style>
        :root { --bg: #1a1a1a; --card: #252525; --accent: #4facfe; --white: #f0d9b5; --black: #b58863; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #eee; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .wrapper { max-width: 500px; width: 100%; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; margin-bottom: 20px; }
        h1 { color: var(--accent); text-align: center; margin-top: 0; text-transform: uppercase; font-size: 1.5rem; }
        
        /* Сетка доски */
        .board { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; aspect-ratio: 1; border: 5px solid #333; user-select: none; }
        .cell { display: flex; justify-content: center; align-items: center; font-size: 40px; cursor: pointer; position: relative; }
        .cell.white { background: var(--white); }
        .cell.black { background: var(--black); }
        .cell.selected { background: #ffeb3b !important; }
        .cell:hover { opacity: 0.9; }

        .eval-panel { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 4px solid var(--accent); }
        .score { font-size: 1.8rem; font-weight: bold; color: #00f2fe; }
        .status { font-size: 0.9rem; color: #888; }
        p { line-height: 1.5; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h1>ChessMind</h1>
        <p><strong>Теоретический модуль:</strong> Испанская партия. Используйте доску ниже для интерактивного обучения. Встроенный алгоритм оценивает преимущество в реальном времени.</p>
    </div>

    <div class="card">
        <div id="status" class="status">Ход белых</div>
        <div id="board" class="board"></div>
        <div class="eval-panel">
            <div>
                <div class="status">Оценка позиции (CP)</div>
                <div id="eval" class="score">+0.15</div>
            </div>
            <button onclick="resetGame()" style="background: #444; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer;">Сброс</button>
        </div>
    </div>
</div>

<script>
    const boardElement = document.getElementById('board');
    const evalElement = document.getElementById('eval');
    const statusElement = document.getElementById('status');

    // Фигуры (Unicode)
    const pieces = {
        'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
        'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
    };

    // Начальная расстановка
    let gameState = [
        ['r','n','b','q','k','b','n','r'],
        ['p','p','p','p','p','p','p','p'],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        ['P','P','P','P','P','P','P','P'],
        ['R','N','B','Q','K','B','N','R']
    ];

    let selected = null;
    let turn = 'white';

    function createBoard() {
        boardElement.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                cell.dataset.r = r;
                cell.dataset.c = c;
                cell.innerText = pieces[gameState[r][c]] || '';
                
                if (selected && selected.r === r && selected.c === c) {
                    cell.classList.add('selected');
                }

                cell.onclick = () => handleCellClick(r, c);
                boardElement.appendChild(cell);
            }
        }
        updateEval();
    }

    function handleCellClick(r, c) {
        const piece = gameState[r][c];

        if (selected) {
            // Ход
            if (selected.r !== r || selected.c !== c) {
                gameState[r][c] = gameState[selected.r][selected.c];
                gameState[selected.r][selected.c] = null;
                turn = turn === 'white' ? 'black' : 'white';
                statusElement.innerText = turn === 'white' ? 'Ход белых' : 'Ход черных';
            }
            selected = null;
        } else {
            if (piece) {
                const isWhite = piece === piece.toUpperCase();
                if ((isWhite && turn === 'white') || (!isWhite && turn === 'black')) {
                    selected = {r, c};
                }
            }
        }
        createBoard();
    }

    // Простой алгоритм оценки (имитация NNUE для проекта)
    function updateEval() {
        let score = 0;
        const weights = { 'P': 1, 'N': 3, 'B': 3, 'R': 5, 'Q': 9, 'K': 0 };
        
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const p = gameState[r][c];
                if (!p) continue;
                const val = weights[p.toUpperCase()];
                score += (p === p.toUpperCase()) ? val : -val;
            }
        }
        
        // Немного рандома для имитации "раздумий" ИИ
        const displayScore = (score + (Math.random() * 0.4 - 0.2)).toFixed(2);
        evalElement.innerText = (displayScore > 0 ? '+' : '') + displayScore;
    }

    function resetGame() {
        location.reload();
    }

    createBoard();
</script>
</body>
</html>
